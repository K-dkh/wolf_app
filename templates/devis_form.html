{% extends "base.html" %}
{% block title %}{{ titre }} — Wolf Energy{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}

<div class="card" style="max-width:700px">
  <div class="card-header">
    <div class="card-title"><i class="bi bi-file-earmark-text-fill"></i> {{ titre }}</div>
    <a href="{{ url_for('devis_liste') }}" class="btn btn-ghost btn-sm">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Référence *</label>
          <input name="reference_devis" class="form-control" required
                 placeholder="DEV-2026-0001"
                 value="{{ devis.reference_devis if devis }}">
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select name="statut" class="form-control">
            {% for s in ['Brouillon','Envoyé','Accepté','Refusé','Expiré','Annulé'] %}
            <option value="{{ s }}"
              {{ 'selected' if devis and devis.statut == s
                 else ('selected' if not devis and s == 'Brouillon') }}>
              {{ s }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Client *</label>
          <select name="id_client" class="form-control" required>
            <option value="">— Sélectionner —</option>
            {% for c in clients %}
            <option value="{{ c.id_client }}"
              {{ 'selected' if devis and devis.id_client == c.id_client }}>
              {{ c.nom }}{% if c.prenom %} {{ c.prenom }}{% endif %}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Audit lié</label>
          <select name="id_audit" class="form-control">
            <option value="">— Aucun —</option>
            {% for a in audits %}
            <option value="{{ a.id_audit }}"
              {{ 'selected' if devis and devis.id_audit == a.id_audit }}>
              {{ a.reference_audit }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Date du devis</label>
          <input name="date_devis" type="date" class="form-control"
                 value="{{ devis.date_devis.strftime('%Y-%m-%d') if devis and devis.date_devis }}">
        </div>
        <div class="form-group">
          <label>Date d'acceptation</label>
          <input name="date_acceptation" type="date" class="form-control"
                 value="{{ devis.date_acceptation.strftime('%Y-%m-%d') if devis and devis.date_acceptation }}">
        </div>
        <div class="form-group">
          <label>Montant HT (€) *</label>
          <input name="montant_ht" type="number" step="0.01" class="form-control" required
                 value="{{ devis.montant_ht or '' if devis }}">
        </div>
        <div class="form-group">
          <label>Taux TVA (%)</label>
          <input name="taux_tva" type="number" step="0.01" class="form-control"
                 value="{{ devis.taux_tva or 20.00 if devis else 20.00 }}">
        </div>
        <div class="form-group full">
          <label>Description de la prestation</label>
          <textarea name="description" class="form-control">{{ devis.description or '' if devis }}</textarea>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea name="notes" class="form-control">{{ devis.notes or '' if devis }}</textarea>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:6px">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Enregistrer
        </button>
        <a href="{{ url_for('devis_liste') }}" class="btn btn-ghost">Annuler</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}

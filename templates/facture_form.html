{% extends "base.html" %}
{% block title %}{{ titre }} — Wolf Energy{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}

<div class="card" style="max-width:700px">
  <div class="card-header">
    <div class="card-title"><i class="bi bi-receipt-cutoff"></i> {{ titre }}</div>
    <a href="{{ url_for('factures_liste') }}" class="btn btn-ghost btn-sm">
      <i class="bi bi-arrow-left"></i> Retour
    </a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Référence *</label>
          <input name="reference_facture" class="form-control" required
                 placeholder="FAC-2026-0001"
                 value="{{ facture.reference_facture if facture }}">
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select name="type_facture" class="form-control">
            {% for t in ['Facture','Avoir','Acompte'] %}
            <option value="{{ t }}"
              {{ 'selected' if facture and facture.type_facture == t
                 else ('selected' if not facture and t == 'Facture') }}>
              {{ t }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Client *</label>
          <select name="id_client" class="form-control" required>
            <option value="">— Sélectionner —</option>
            {% for c in clients %}
            <option value="{{ c.id_client }}"
              {{ 'selected' if facture and facture.id_client == c.id_client }}>
              {{ c.nom }}{% if c.prenom %} {{ c.prenom }}{% endif %}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Date de facture</label>
          <input name="date_facture" type="date" class="form-control"
                 value="{{ facture.date_facture.strftime('%Y-%m-%d') if facture and facture.date_facture }}">
        </div>
        <div class="form-group">
          <label>Devis lié</label>
          <select name="id_devis" class="form-control">
            <option value="">— Aucun —</option>
            {% for d in devis %}
            <option value="{{ d.id_devis }}"
              {{ 'selected' if facture and facture.id_devis == d.id_devis }}>
              {{ d.reference_devis }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Audit lié</label>
          <select name="id_audit" class="form-control">
            <option value="">— Aucun —</option>
            {% for a in audits %}
            <option value="{{ a.id_audit }}"
              {{ 'selected' if facture and facture.id_audit == a.id_audit }}>
              {{ a.reference_audit }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Montant HT (€) *</label>
          <input name="montant_ht" type="number" step="0.01" class="form-control" required
                 value="{{ facture.montant_ht or '' if facture }}">
        </div>
        <div class="form-group">
          <label>Taux TVA (%)</label>
          <input name="taux_tva" type="number" step="0.01" class="form-control"
                 value="{{ facture.taux_tva or 20.00 if facture else 20.00 }}">
        </div>
        <div class="form-group">
          <label>Montant payé (€)</label>
          <input name="montant_paye" type="number" step="0.01" class="form-control"
                 value="{{ facture.montant_paye or 0 if facture else 0 }}">
        </div>
        <div class="form-group">
          <label>Date de paiement</label>
          <input name="date_paiement" type="date" class="form-control"
                 value="{{ facture.date_paiement.strftime('%Y-%m-%d') if facture and facture.date_paiement }}">
        </div>
        <div class="form-group full">
          <label>Mode de paiement</label>
          <select name="mode_paiement" class="form-control">
            <option value="">— Non renseigné —</option>
            {% for m in ['Virement','Chèque','CB','Espèces'] %}
            <option value="{{ m }}"
              {{ 'selected' if facture and facture.mode_paiement == m }}>
              {{ m }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea name="description" class="form-control">{{ facture.description or '' if facture }}</textarea>
        </div>
        <div class="form-group full">
          <label>Mentions légales</label>
          <textarea name="mentions_legales" class="form-control">{{ facture.mentions_legales if facture else 'TVA non applicable – article 293 B du CGI' }}</textarea>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea name="notes" class="form-control">{{ facture.notes or '' if facture }}</textarea>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:6px">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Enregistrer
        </button>
        <a href="{{ url_for('factures_liste') }}" class="btn btn-ghost">Annuler</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
